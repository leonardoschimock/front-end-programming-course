<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms HTTML</title>
    <link rel = "stylesheet" href="/css/style.css">
</head>


<body>
    <h1>Formulário HTML</h1>
    
<!-- Iniciando Forms -->
    
    <form action = "/submit" method = "post">

<!-- Nome -->

        <label for = "nome">Nome:</label>
        <input type = "text" id = "nome" name = "nome"> <br><br>

<!-- Email -->

        <label for = "Email">Email:</label>
        <input type = "email" id = "email" name = "email" required> <br><br>

<!-- Senha -->

        <label for = "password">Senha:</label>
        <input type= "password" id = "senha" name = "senha" pattern = [0-9]{8} required> <br><br>

<!-- Data -->

        <label for = "date">Data:</label>
        <input type = "date" id = "data" name = "data" required> <br><br>

<!-- Genero -->

        <label for = "genero">Genero:</label> <br><br>
        <input type = "radio" id = "genero" name = "genero" value = "masculino"> Masculino
        <input type = "radio" id = "genero" name = "genero" value = "feminino"> Feminino
        <input type = "radio" id = "genero" name = "genero" value = "outro"> Outro <br><br>

<!-- Checkbox interesses -->

        <label for = "Select">Interesses:</label><br><br>
        <input type = "checkbox" id = "interesses" value ="programação">Programação <br><br>
        <input type="checkbox" id = "interesses" value = "design">Design <br><br>
        <input type="checkbox" id = "interesses" value = "marketing">Markeeting <br><br>

<!-- Mensagem/Descrição -->

        <label for="Mensagem">Mensagem:</label><br><br>
        <textarea id = "mensagem" name = "mensagem" raws = "4" cols = "40"></textarea> <br><br>

<!-- Botão -->

        <button type="submit">Enviar</button>
    
    </form>
</body>
</html>
